<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Perf: warm up connections to image origins used above the fold -->
    <link rel="preconnect" href="https://wonderlyf.com" crossorigin />
    <link rel="preconnect" href="https://api.wonderlyf.co.uk" crossorigin />
    <link rel="dns-prefetch" href="https://wonderlyf.com" />
    <link rel="dns-prefetch" href="https://api.wonderlyf.co.uk" />

    <!-- Hero video starts downloading via the <video preload="auto"> element
         in HeroVideo.jsx. We previously had a <link rel=preload> here but it
         doesn't match any actual fetch() call so the browser logs an
         "unused preload" warning — the <video> tag handles it natively. -->
    <link rel="dns-prefetch" href="https://wonderlyf.com" />
    <title>Wonderlyf UK | Traditional Indian Wellness Products | Free UK Delivery</title>
    <meta name="description" content="Shop authentic Indian wellness products in the UK. Pure forest honey, traditional herbal remedies, moringa products, and handcrafted food. Free delivery over £30. FSSAI certified, 100% natural." />
    <meta name="keywords" content="Indian wellness products UK, forest honey UK, moringa honey, traditional Indian food UK, herbal remedies, natural products, Ayurvedic food, Tamil Nadu food UK" />
    <meta name="author" content="Wonderlyf" />
    <meta name="theme-color" content="#D4940A" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://wonderlyf.co.uk/" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="GB" />
    <meta name="geo.placename" content="United Kingdom" />
    <meta name="content-language" content="en-GB" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wonderlyf UK" />
    <meta property="og:title" content="Wonderlyf UK | Traditional Indian Wellness Products" />
    <meta property="og:description" content="Shop authentic Indian wellness products in the UK. Pure forest honey, traditional herbal remedies, and handcrafted food. Free delivery over £30." />
    <meta property="og:url" content="https://wonderlyf.co.uk/" />
    <meta property="og:image" content="https://wonderlyf.com/wp-content/uploads/2026/01/Natures-Gold-1.jpg" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wonderlyf UK | Traditional Indian Wellness Products" />
    <meta name="twitter:description" content="Shop authentic Indian wellness products in the UK. Pure forest honey, herbal remedies, and handcrafted food." />
    <meta name="twitter:image" content="https://wonderlyf.com/wp-content/uploads/2026/01/Natures-Gold-1.jpg" />

    <!-- Fonts — async-loaded so they don't block the first paint.
         We request only the weights actually used to cut ~1.5s of render
         blocking reported by PageSpeed Insights. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    >
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
      >
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
